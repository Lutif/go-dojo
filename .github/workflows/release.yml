name: Build & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Create the release tag once; all build jobs reference it ─────────────
  tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=${GITHUB_SHA::7}
          TAG="v${VERSION}-${SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Create GitHub Release (empty, assets added by build jobs)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Go Dojo ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
          body: |
            ## Go Dojo ${{ steps.tag.outputs.tag }}

            Built from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Downloads
            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon M1/M2/M3) | `*-arm64.dmg` |
            | macOS (Intel) | `*-x64.dmg` or `*.dmg` |
            | Windows | `*-Setup-*.exe` (installer) or `*.exe` (portable) |
            | Linux | `*.AppImage` · `*.deb` · `*.rpm` |

            > **Go 1.21+** must be installed on your machine for exercises to run.

  # ── macOS ────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    needs: tag
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Import Developer ID cert into temporary keychain
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          echo "$MAC_CERT_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import $RUNNER_TEMP/cert.p12 -k build.keychain \
            -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm $RUNNER_TEMP/cert.p12

      - name: Build (macOS) — sign + notarize
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: build.keychain

      - name: List release output
        run: ls -lh release/

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: |
            release/*.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows ──────────────────────────────────────────────────────────────
  build-win:
    name: Build Windows
    needs: tag
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (Windows)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release output
        run: dir release

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: |
            release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm || true
          sudo apt-get install -y libwebkit2gtk-4.1-dev 2>/dev/null || \
          sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Build (Linux)
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release output
        run: ls -lh release/

      - name: Upload Linux artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
